name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  NODE_VERSION: "22"
  DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
  BETTER_AUTH_URL: "http://localhost:3000"
  BETTER_AUTH_SECRET: "placeholder-secret-for-ci"

jobs:
  validate:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: aios/package-lock.json
      - run: npm ci
        working-directory: aios
      - run: npm run typecheck
        working-directory: aios
      - run: npm run lint
        working-directory: aios

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: aios/package-lock.json
      - run: npm ci
        working-directory: aios
      - run: npm test
        working-directory: aios

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: aios/package-lock.json
      - run: npm ci
        working-directory: aios
      - run: npm run build
        working-directory: aios

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: aios
        continue-on-error: true

  schema:
    name: Drizzle Schema Check
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: aios/package-lock.json
      - run: npm ci
        working-directory: aios
      - name: Check Drizzle schema compiles
        run: npx drizzle-kit check
        working-directory: aios
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        continue-on-error: true
